<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: sans-serif;
        background: #0a0a0a;
        color: #fff;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 14px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 8px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 8px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h2>Placement Tracker</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="capture">Capture Job</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
